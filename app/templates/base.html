<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>{% block title %}Cognitive Load System{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">🧠 Cognitive Load Platform</a>

      <div class="d-flex">
        {% if session.get("user_id") %}
        <span class="navbar-text text-white me-3">
          {{ session.get("user_name") }} ({{ session.get("user_role") }})
        </span>
        <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-light btn-sm">
          Logout
        </a>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    {% block content %}{% endblock %}
  </div>

  {% if session.get("user_id") and session.get("user_role") != "admin" %}
  <script>
    // Poll for commands from admin
    setInterval(async () => {
      try {
        const res = await fetch("/user/check_trigger");
        const data = await res.json();
        if (data.command === "START_MONITORING") {
          console.log("Received start monitoring command!");
          // Redirect to live monitor page
          window.location.href = "/live/monitor";
        }
      } catch (e) {
        console.error("Polling error", e);
      }
    }, 2000); // Check every 2s
  </script>
  {% endif %}

</body>

</html>
