<!DOCTYPE html>
<html>

<head>
    <title>Monitor: {{ user.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand">👁 Monitoring: <strong>{{ user.name }}</strong></span>
        <div>
            <a href="/admin/live_dashboard" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">

            <!-- ================= CAMERA FEED ================= -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-dark text-white">Live Camera Feed</div>
                    <div class="card-body text-center p-0 bg-black">
                        <!-- Direct Stream from /admin/video_feed/ID -->
                        <img src="/admin/video_feed/{{ user_id }}" class="img-fluid"
                            style="max-height: 500px; width: 100%; object-fit: contain;">
                    </div>
                    <div id="cameraStatus" class="card-footer text-center fw-bold bg-secondary text-white"
                        style="display: none;">
                        <!-- Status message will appear here -->
                    </div>
                </div>
            </div>

            <!-- ================= METRICS ================= -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header fw-bold">Live Metrics</div>
                    <div class="card-body">

                        <!-- Big Metrics Row -->
                        <div class="row text-center mb-3">
                            <div class="col-6">
                                <div class="p-3 border rounded bg-light">
                                    <h6 class="text-muted">EAR</h6>
                                    <h2 id="ear" class="fw-bold text-primary">-</h2>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="p-3 border rounded bg-light">
                                    <h6 class="text-muted">Blink Rate</h6>
                                    <h2 id="blink_rate" class="fw-bold text-success">-</h2>
                                    <small class="text-muted">per min</small>
                                </div>
                            </div>
                        </div>

                        <!-- Trend / Status Box -->
                        <div id="trendBox" class="alert alert-secondary text-center">
                            <strong id="trendText">Connecting...</strong>
                        </div>

                        <hr>

                        <!-- Hidden detailed metrics -->
                        <ul class="list-group list-group-flush small">
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Alert Level:</span> <b id="alert_level">-</b>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Rule Based:</span> <b id="rule">-</b>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Random Forest:</span> <b id="rf">-</b>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>LSTM:</span> <b id="lstm">-</b>
                            </li>

                        </ul>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const USER_ID = {{ user_id }};
        const cameraBox = document.querySelector(".card-body.bg-black");
        let streamAttached = true;

        const cameraStatus = document.getElementById("cameraStatus");

        // Remove old overlay logic if present
        // const overlay = ... (removed)

        const imgElement = cameraBox.querySelector("img");

        setInterval(async () => {
            try {
                const res = await fetch(`/admin/api/metrics/${USER_ID}`);
                if (!res.ok) throw new Error("Fetch failed");

                const d = await res.json();

                // === HANDLE PHASE / STATUS ===

                if (d.phase === "pause") {
                    // Show STATUS footer
                    cameraStatus.style.display = "block";
                    cameraStatus.className = "card-footer text-center fw-bold bg-warning text-dark";
                    cameraStatus.innerHTML = `⏸ Waiting for next capture: ${d.remaining_seconds}s`;

                    if (imgElement) imgElement.style.opacity = "1";
                } else if (d.phase === "completed") {
                    cameraStatus.style.display = "block";
                    cameraStatus.className = "card-footer text-center fw-bold bg-success text-white";
                    cameraStatus.innerHTML = `✅ Session Completed`;

                    if (imgElement) imgElement.style.opacity = "0.5";
                } else {
                    // CAPTURE / CALIBRATING -> PURE VIDEO
                    cameraStatus.style.display = "none";
                    if (imgElement) imgElement.style.opacity = "1";
                }

                if (!d.ready) {
                    document.getElementById("trendText").innerText = d.message || "Waiting for data...";
                    return;
                }

                document.getElementById("ear").innerText = d.ear;
                document.getElementById("blink_rate").innerText = d.blink_rate;

                document.getElementById("rule").innerText = d.rule;
                document.getElementById("rf").innerText = d.rf;
                document.getElementById("lstm").innerText = d.lstm;
                document.getElementById("alert_level").innerText = d.alert;


                // Status Logic
                const trendBox = document.getElementById("trendBox");
                const trendText = document.getElementById("trendText");

                if (d.alert === "High" || d.alert === "Critical") {
                    trendBox.className = "alert alert-danger text-center fw-bold";
                    trendText.innerText = "🚨 HIGH FATIGUE (Distracted)";
                } else if (d.alert === "Medium") {
                    trendBox.className = "alert alert-warning text-center";
                    trendText.innerText = "⚠️ Medium Load (Distracted)";
                } else {
                    trendBox.className = "alert alert-success text-center";
                    trendText.innerText = "✅ Focused / Normal";
                }

            } catch (e) {
                console.log("Error fetching metrics", e);
                document.getElementById("trendText").innerText = "Offline / Disconnected";
            }
        }, 500);
    </script>

</body>

</html>
