<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MindGuard AI – Edit Profile</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script>
        (function () {
            const t = localStorage.getItem('mg-theme') || 'dark';
            document.documentElement.classList.toggle('dark', t !== 'light');
        })();
    </script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#13ecda", "background-dark": "#0d1f1e", "card-dark": "#102220", "border-dark": "#1e3432" }, fontFamily: { display: ["Inter", "sans-serif"] } } }
        };
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        html:not(.dark) body {
            background: #f0fffe;
            color: #0d2b29;
        }

        html:not(.dark) header {
            background: rgba(240, 255, 254, 0.95) !important;
            border-color: #c2e8e5;
        }

        html:not(.dark) .bg-card-dark {
            background: #ffffff !important;
            border-color: #c8e8e5 !important;
        }

        html:not(.dark) .bg-background-dark {
            background: #f0fffe !important;
        }

        html:not(.dark) .text-slate-400 {
            color: #4a7a76 !important;
        }

        html:not(.dark) .text-slate-100,
        html:not(.dark) .text-slate-300 {
            color: #0d2b29 !important;
        }

        html:not(.dark) .border-border-dark {
            border-color: #c8e8e5 !important;
        }

        html:not(.dark) input,
        html:not(.dark) textarea {
            background-color: rgba(200, 240, 238, 0.5) !important;
            border-color: #c8e8e5 !important;
            color: #0d2b29 !important;
        }

        /* Custom input styling */
        input,
        textarea {
            background-color: rgba(30, 52, 50, 0.5) !important;
            border-color: #1e3432 !important;
            color: #f1f5f9 !important;
        }

        input:focus,
        textarea:focus {
            border-color: #13ecda !important;
            box-shadow: 0 0 0 2px rgba(19, 236, 218, 0.15) !important;
            outline: none;
        }

        input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

<body class="bg-background-dark text-slate-100 min-h-screen">

    <!-- NAVBAR -->
    <header class="sticky top-0 z-50 bg-card-dark/90 backdrop-blur-md border-b border-border-dark px-6 py-3">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-primary p-2 rounded-lg">
                    <span class="material-symbols-outlined text-background-dark leading-none"
                        style="font-size:1.25rem;">psychology</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight">MindGuard AI</h1>
                    <p class="text-xs text-slate-400 font-medium">Edit Profile</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" id="themeBtn"
                    class="p-2 rounded-lg border border-border-dark text-slate-400 hover:text-primary hover:border-primary/40 transition-colors"
                    title="Toggle theme">
                    <span id="themeIcon" class="material-symbols-outlined" style="font-size:1.1rem;">light_mode</span>
                </button>
                <a href="/auth/logout"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-red-800/60 text-red-400 hover:bg-red-900/20 transition-colors text-sm font-semibold">
                    <span class="material-symbols-outlined" style="font-size:1rem;">logout</span>
                    Logout
                </a>
                <a href="{{ url_for('user.profile') }}"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-border-dark text-slate-400 hover:text-primary hover:border-primary/40 transition-colors text-sm font-medium">
                    <span class="material-symbols-outlined" style="font-size:1rem;">arrow_back</span>
                    Back
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 md:p-6 lg:p-8">

        <!-- Page Header -->
        <div class="flex items-center gap-4 mb-8">
            <div class="w-16 h-16 rounded-2xl bg-primary/10 border border-primary/20 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary" style="font-size:2rem;">edit</span>
            </div>
            <div>
                <h2 class="text-2xl font-black">Edit Profile</h2>
                <p class="text-slate-400 text-sm mt-0.5">Update your personal information</p>
            </div>
        </div>

        <!-- Form Card -->
        <div class="bg-card-dark border border-border-dark rounded-2xl shadow-sm overflow-hidden">
            <div class="h-2 bg-gradient-to-r from-primary via-primary/60 to-transparent"></div>
            <div class="p-8">

                {% if error %}
                <div
                    class="mb-6 flex items-center gap-3 bg-red-900/20 border border-red-800/50 text-red-300 px-4 py-3 rounded-xl text-sm">
                    <span class="material-symbols-outlined text-red-400" style="font-size:1.1rem;">error</span>
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST" action="{{ url_for('user.edit_profile') }}" class="space-y-6">

                    <!-- Name -->
                    <div class="space-y-2">
                        <label
                            class="flex items-center gap-1.5 text-xs font-bold uppercase tracking-wider text-slate-400">
                            <span class="material-symbols-outlined" style="font-size:0.9rem;">badge</span>
                            Full Name
                        </label>
                        <input type="text" name="name" value="{{ user.name }}" required
                            class="w-full px-4 py-3 rounded-xl border text-sm transition-all"
                            placeholder="Your full name" />
                    </div>

                    <!-- Email -->
                    <div class="space-y-2">
                        <label
                            class="flex items-center gap-1.5 text-xs font-bold uppercase tracking-wider text-slate-400">
                            <span class="material-symbols-outlined" style="font-size:0.9rem;">mail</span>
                            Email Address
                        </label>
                        <input type="email" name="email" value="{{ user.email }}" required
                            class="w-full px-4 py-3 rounded-xl border text-sm transition-all"
                            placeholder="your@email.com" />
                    </div>

                    <!-- Address -->
                    <div class="space-y-2">
                        <label
                            class="flex items-center gap-1.5 text-xs font-bold uppercase tracking-wider text-slate-400">
                            <span class="material-symbols-outlined" style="font-size:0.9rem;">location_on</span>
                            Address
                        </label>
                        <textarea name="address" rows="3"
                            class="w-full px-4 py-3 rounded-xl border text-sm transition-all resize-none"
                            placeholder="Your address (optional)">{{ user.address or '' }}</textarea>
                    </div>

                    <!-- User ID (read-only) -->
                    <div class="space-y-2">
                        <label
                            class="flex items-center gap-1.5 text-xs font-bold uppercase tracking-wider text-slate-500">
                            <span class="material-symbols-outlined" style="font-size:0.9rem;">fingerprint</span>
                            User ID (Read-only)
                        </label>
                        <input type="text" value="{{ user.id if user.id else '' }}" disabled readonly
                            class="w-full px-4 py-3 rounded-xl border text-sm font-mono" />
                        <p class="text-xs text-slate-500">This is your unique system identifier and cannot be changed.
                        </p>
                    </div>

                    <!-- Actions -->
                    <div class="flex flex-wrap gap-3 pt-4 border-t border-border-dark">
                        <button type="submit"
                            class="flex items-center gap-2 bg-primary text-background-dark font-bold px-6 py-2.5 rounded-xl hover:opacity-90 transition active:scale-95">
                            <span class="material-symbols-outlined" style="font-size:1rem;">save</span>
                            Save Changes
                        </button>
                        <a href="{{ url_for('user.profile') }}"
                            class="flex items-center gap-2 border border-border-dark text-slate-400 hover:text-slate-200 hover:border-slate-600 font-semibold px-6 py-2.5 rounded-xl transition">
                            <span class="material-symbols-outlined" style="font-size:1rem;">close</span>
                            Cancel
                        </a>
                    </div>

                </form>
            </div>
        </div>

    </main>
    <script>
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('mg-theme', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').innerText = isDark ? 'light_mode' : 'dark_mode';
        }
        document.getElementById('themeIcon').innerText =
            document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
    </script>
</body>

</html>
